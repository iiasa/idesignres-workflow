# This yaml file adds needed variables for E3M´s model data upload

- Capacity|Hydrogen|Electricity|Alkaline:
    description: Installed (available) capacity to produce hydrogen from electrolysis using an Alkaline electrolyser
    unit: GW

- Capacity|Hydrogen|Electricity|PEM:
    description: Installed (available) capacity to produce hydrogen from electrolysis using an Proton Exchange Membrane (PEM) elecrolyser
    unit: GW

- Storage Capacity|Hydrogen:
    description: Installed (available) capacity of hydrogen storage systems
    unit: GW
    
- Storage Capacity|Hydrogen|Tank:
    description: Installed (available) capacity of hydrogen using tanks
    unit: GW

- Secondary Energy|Hydrogen|Electricity|Alkaline:
    description: Net hydrogen production from Alkaline electrolysers
    unit: GWh

- Secondary Energy|Hydrogen|Electricity|PEM:
    description: Net hydrogen production from Proton Exchange Membrane (PEM) elecrolysers
    unit: GWh
